<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Hat Training Viewer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────── -->
  <header id="topbar">
    <span id="site-brand">Training Viewer</span>

    <nav id="course-tabs" role="tablist"></nav>

    <div id="search-wrap">
      <svg id="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search modules & sections…" autocomplete="off"/>
    </div>

    <button id="theme-btn" title="Toggle dark/light mode">☾</button>
  </header>

  <!-- ── Layout ──────────────────────────────────────────────── -->
  <div id="layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <button id="sidebar-close" aria-label="Close sidebar">✕</button>
      <div id="nav-tree"></div>
    </nav>

    <!-- Slide panel -->
    <main id="main">
      <button id="sidebar-open" aria-label="Open sidebar">☰</button>

      <div id="viewer">
        <div id="slide-wrap">
          <img id="slide-img" src="" alt="Slide" />
          <div id="slide-placeholder">
            <p>Select a module or section from the sidebar to begin.</p>
          </div>
        </div>

        <div id="controls">
          <button id="btn-prev" disabled>◀ Prev</button>
          <span id="slide-counter">—</span>
          <button id="btn-next" disabled>Next ▶</button>
        </div>
      </div>

      <!-- Search results overlay -->
      <div id="search-results" hidden>
        <h2>Search results</h2>
        <div id="search-list"></div>
      </div>
    </main>

  </div>

  <!-- Fullscreen overlay -->
  <div id="fullscreen-overlay" hidden>
    <button id="fs-close">✕</button>
    <img id="fs-img" src="" alt="Slide fullscreen" />
    <div id="fs-controls">
      <button id="fs-prev">◀</button>
      <span id="fs-counter"></span>
      <button id="fs-next">▶</button>
    </div>
  </div>

  <script src="./app.js"></script>

  <!-- ── Password gate ──────────────────────────────────────── -->
  <div id="pw-gate">
    <div id="pw-box">
      <h2>Black Hat Training Viewer</h2>
      <p>This site is private. Enter the password to continue.</p>
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="pw-submit">Enter</button>
      <p id="pw-error" hidden>Incorrect password.</p>
    </div>
  </div>

  <script>
    // Change SITE_PASSWORD to whatever you want
    const SITE_PASSWORD = "blackhat2026";
    const SESSION_KEY   = "bhviewer_auth";

    const gate    = document.getElementById("pw-gate");
    const input   = document.getElementById("pw-input");
    const submit  = document.getElementById("pw-submit");
    const errMsg  = document.getElementById("pw-error");

    function unlock() { gate.style.display = "none"; }

    // Already authenticated this session?
    if (sessionStorage.getItem(SESSION_KEY) === "1") {
      unlock();
    }

    function attempt() {
      if (input.value === SITE_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, "1");
        unlock();
      } else {
        errMsg.hidden = false;
        input.value = "";
        input.focus();
        gate.querySelector("#pw-box").classList.add("shake");
        setTimeout(() => gate.querySelector("#pw-box").classList.remove("shake"), 500);
      }
    }

    submit.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  </script>
</body>
</html>
